services:
  fe:
    build:
      context: ./website
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../website/.env
    networks:
      - shared

  9router:
    image: pigeatgarlic/9router:latest
    container_name: 9router
    restart: unless-stopped
    network_mode: host
    environment:
      DATA_DIR: /app/data
      PORT: 20128
      HOSTNAME: 10.30.30.35
      NEXT_TELEMETRY_DISABLED: "1"
      # DEBUG: "true"
    volumes:
      - ../9router:/app/data
    networks:
      - shared