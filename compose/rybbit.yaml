services:
  rybbit-clickhouse:
    container_name: rybbit-clickhouse
    image: clickhouse/clickhouse-server:25.4.2
    restart: unless-stopped
    volumes:
      - ../volumes/rybbit/clickhouse:/var/lib/clickhouse
    configs:
      - source: clickhouse_network
        target: /etc/clickhouse-server/config.d/network.xml
      - source: clickhouse_json
        target: /etc/clickhouse-server/config.d/enable_json.xml
      - source: clickhouse_logging
        target: /etc/clickhouse-server/config.d/logging_rules.xml
      - source: clickhouse_user_logging
        target: /etc/clickhouse-server/config.d/user_logging.xml
    environment:
      CLICKHOUSE_DB: ${RYBBIT_CLICKHOUSE_DB:-analytics}
      CLICKHOUSE_USER: ${RYBBIT_CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${RYBBIT_CLICKHOUSE_PASSWORD:-frog}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shared

  rybbit-postgres:
    container_name: rybbit-postgres
    image: postgres:17.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${RYBBIT_POSTGRES_USER:-frog}
      POSTGRES_PASSWORD: ${RYBBIT_POSTGRES_PASSWORD:-frog}
      POSTGRES_DB: ${RYBBIT_POSTGRES_DB:-analytics}
    volumes:
      - ../volumes/rybbit/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shared

  rybbit-backend:
    container_name: rybbit-backend
    image: ghcr.io/rybbit-io/rybbit-backend:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CLICKHOUSE_HOST: http://rybbit-clickhouse:8123
      CLICKHOUSE_DB: ${RYBBIT_CLICKHOUSE_DB:-analytics}
      CLICKHOUSE_PASSWORD: ${RYBBIT_CLICKHOUSE_PASSWORD:-frog}
      POSTGRES_HOST: rybbit-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${RYBBIT_POSTGRES_DB:-analytics}
      POSTGRES_USER: ${RYBBIT_POSTGRES_USER:-frog}
      POSTGRES_PASSWORD: ${RYBBIT_POSTGRES_PASSWORD:-frog}
      BETTER_AUTH_SECRET: ${RYBBIT_AUTH_SECRET:-change-me-secret}
      BASE_URL: ${RYBBIT_BASE_URL:-http://localhost:3002}
      DISABLE_SIGNUP: "false"
    depends_on:
      rybbit-clickhouse:
        condition: service_healthy
      rybbit-postgres:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shared

  rybbit-client:
    container_name: rybbit-client
    image: ghcr.io/rybbit-io/rybbit-client:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BACKEND_URL: ${RYBBIT_BASE_URL:-http://localhost:3002}
      NEXT_PUBLIC_DISABLE_SIGNUP: "false"
    depends_on:
      - rybbit-backend
    networks:
      - shared

configs:
  clickhouse_network:
    content: |
      <clickhouse>
          <listen_host>0.0.0.0</listen_host>
      </clickhouse>
  clickhouse_json:
    content: |
      <clickhouse>
          <settings>
              <enable_json_type>1</enable_json_type>
          </settings>
      </clickhouse>
  clickhouse_logging:
    content: |
      <clickhouse>
        <logger>
            <level>warning</level>
            <console>true</console>
        </logger>
        <query_thread_log remove="remove"/>
        <query_log remove="remove"/>
        <text_log remove="remove"/>
        <trace_log remove="remove"/>
        <metric_log remove="remove"/>
        <asynchronous_metric_log remove="remove"/>
        <session_log remove="remove"/>
        <part_log remove="remove"/>
        <latency_log remove="remove"/>
        <processors_profile_log remove="remove"/>
      </clickhouse>
  clickhouse_user_logging:
    content: |
      <clickhouse>
        <profiles>
          <default>
            <log_queries>0</log_queries>
            <log_query_threads>0</log_query_threads>
            <log_processors_profiles>0</log_processors_profiles>
          </default>
        </profiles>
      </clickhouse>

networks:
  shared:
    name: thinkmay
