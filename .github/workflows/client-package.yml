---
name: Client Package

on:
  push:
    branches: [main]
    paths:
      - 'worker/proxy'
      - 'packaging/client/**'
      - 'packaging/homebrew/**'
      - 'Formula/**'
      - 'Casks/**'
      - '.github/workflows/client-package.yml'
  workflow_dispatch:
    inputs:
      publish:
        description: Upload packaged clients to binary storage
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package_linux:
    name: Package Linux Client (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
          cache-dependency-path: worker/proxy/go.sum

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: Read client version
        id: version
        run: echo "value=$(tr -d '[:space:]' < packaging/client/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ffmpeg \
            libavcodec-dev \
            libavdevice-dev \
            libavfilter-dev \
            libavformat-dev \
            libavutil-dev \
            libsdl2-dev \
            libswresample-dev \
            libswscale-dev \
            libva-dev \
            libva-drm2 \
            pkg-config

      - name: Build package
        run: |
          chmod +x ./packaging/client/linux/build-linux-package.sh
          ./packaging/client/linux/build-linux-package.sh "${{ matrix.arch }}" "${{ steps.version.outputs.value }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-linux-package
          path: |
            artifacts/thinkmay-client-linux-${{ matrix.arch }}.tar.gz
            artifacts/thinkmay-client-linux-${{ matrix.arch }}.deb

  package_macos:
    name: Package macOS Client
    runs-on: macos-latest

    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
          cache-dependency-path: worker/proxy/go.sum

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: Read client version
        id: version
        run: echo "value=$(tr -d '[:space:]' < packaging/client/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          brew update
          brew install ffmpeg pkg-config sdl2

      - name: Build package
        run: |
          chmod +x ./packaging/client/macos/build-macos-package.sh
          ./packaging/client/macos/build-macos-package.sh arm64 "${{ steps.version.outputs.value }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-macos-package
          path: |
            artifacts/thinkmay-client-darwin-arm64.zip
            artifacts/thinkmay-client-darwin-arm64.dmg

  package_windows:
    name: Package Windows Client
    runs-on: windows-2025

    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
          cache-dependency-path: worker/proxy/go.sum

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup mingw dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-nsis
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-openal
            mingw-w64-x86_64-libcaca
            mingw-w64-x86_64-libva
            mingw-w64-x86_64-libvpl

      - name: Build client
        shell: msys2 {0}
        run: |
          export CGO_ENABLED=1
          export CC=gcc
          export PKG_CONFIG=pkg-config
          mkdir -p artifacts/windows
          cd ./worker/proxy
          go mod download
          go build -trimpath -ldflags="-s -w -H windowsgui" -o ../../artifacts/windows/thinkmay-client.exe ./cmd/client
          go build -trimpath -ldflags="-s -w" -o ../../artifacts/windows/thinkmay-cli.exe ./cmd/client

      - name: Copy runtime DLLs
        shell: msys2 {0}
        run: |
          # Automatically find and copy all mingw64 DLL dependencies
          copy_deps() {
            local deps dll base
            deps=$(ldd "$1" 2>/dev/null | grep '/mingw64/bin/' | awk '{print $3}' || true)
            for dll in $deps; do
              base=$(basename "$dll")
              if [ ! -f "./artifacts/windows/${base}" ]; then
                cp "$dll" ./artifacts/windows/
                copy_deps "$dll"
              fi
            done
          }
          copy_deps ./artifacts/windows/thinkmay-client.exe
          copy_deps ./artifacts/windows/thinkmay-cli.exe
          echo "Copied DLLs:"
          ls -1 ./artifacts/windows/*.dll

      - name: Set executable icons
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -OutFile "rcedit.exe"
          .\rcedit.exe "artifacts/windows/thinkmay-client.exe" --set-icon "images/logo.ico"
          .\rcedit.exe "artifacts/windows/thinkmay-cli.exe" --set-icon "images/logo.ico"

      - name: Copy logo image
        shell: pwsh
        run: |
          mkdir -p artifacts/windows/images
          cp images/logo.png artifacts/windows/images/logo.png

      - name: Build zip package
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/windows/* -DestinationPath artifacts/thinkmay-client-windows-amd64.zip

      - name: Build NSIS installer
        shell: msys2 {0}
        run: |
          cp ./packaging/client/windows/client_installer.nsi ./client_installer.nsi
          makensis ./client_installer.nsi
          mv ./thinkmay-client-windows-amd64-installer.exe ./artifacts/thinkmay-client-windows-amd64-installer.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-windows-package
          path: |
            artifacts/thinkmay-client-windows-amd64.zip
            artifacts/thinkmay-client-windows-amd64-installer.exe

  test_linux:
    name: Test Linux Client (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [package_linux]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: client-linux-package
          path: artifacts

      - name: Test tar package
        run: |
          arch="${{ matrix.arch }}"
          tar -xzf "artifacts/thinkmay-client-linux-${arch}.tar.gz" -C artifacts
          pkg="artifacts/thinkmay-client-linux-${arch}"
          chmod +x "${pkg}/thinkmay-client" "${pkg}/thinkmay-client-bin"
          "${pkg}/thinkmay-client" --help || true
          DESKTOP_FILE="${pkg}/thinkmay-client.desktop"
          grep -q "MimeType=.*x-scheme-handler/thinkmay;" "$DESKTOP_FILE"
          grep -q "Exec=.*-url %u" "$DESKTOP_FILE"
          echo "tar + URL handler OK (${arch})"

      - name: Install and test Debian package in Docker
        run: |
          chmod +x ./packaging/client/linux/test-deb-install.sh
          ./packaging/client/linux/test-deb-install.sh ./artifacts "${{ matrix.arch }}"
  test_macos:
    name: Test macOS Client
    runs-on: macos-latest
    needs: [package_macos]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: client-macos-package
          path: artifacts

      - name: Test zip and dmg packages
        run: |
          zip="artifacts/thinkmay-client-darwin-arm64.zip"
          dmg="artifacts/thinkmay-client-darwin-arm64.dmg"
          test_dir="test-client"

          ditto -x -k "${zip}" "${test_dir}"
          bin="${test_dir}/Thinkmay Client.app/Contents/MacOS/thinkmay-client"
          otool -L "${bin}"
          chmod +x "${bin}"
          "${bin}" --help || true

          PLIST="${test_dir}/Thinkmay Client.app/Contents/Info.plist"
          python3 -c '
          import plistlib, sys
          with open(sys.argv[1], "rb") as f:
              plist = plistlib.load(f)
          schemes = [s for ut in plist.get("CFBundleURLTypes", []) for s in ut.get("CFBundleURLSchemes", [])]
          if "thinkmay" not in schemes:
              raise ValueError("thinkmay URL scheme missing from Info.plist")
          ' "${PLIST}"

          hdiutil attach "${dmg}" -mountpoint /Volumes/ThinkmayClient
          "/Volumes/ThinkmayClient/Thinkmay Client.app/Contents/MacOS/thinkmay-client" --help || true
          hdiutil detach /Volumes/ThinkmayClient
          echo "macOS package tests passed"

  test_windows:
    name: Test Windows Client
    runs-on: windows-latest
    needs: [package_windows]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: client-windows-package
          path: artifacts

      - name: Extract zip package
        shell: pwsh
        run: |
          Expand-Archive -Path artifacts/thinkmay-client-windows-amd64.zip -DestinationPath test-client

      - name: Run client --help
        shell: pwsh
        run: |
          & ./test-client/thinkmay-client.exe --help
          Write-Host "Exit code: $LASTEXITCODE"
          exit 0

      - name: Test custom URL handler registration via installer
        shell: pwsh
        run: |
          $installerPath = "artifacts/thinkmay-client-windows-amd64-installer.exe"
          if (-not (Test-Path $installerPath)) {
              Write-Error "Installer not found at $installerPath"
              exit 1
          }
          
          Write-Host "Running installer silently..."
          Start-Process -FilePath $installerPath -ArgumentList "/S" -Wait
          
          $expectedPath = "$env:LOCALAPPDATA\Thinkmay\Client\thinkmay-client.exe"
          $expectedCmd = "`"$expectedPath`" -url `"%1`""
          
          Write-Host "Verifying registry keys..."
          if (-not (Test-Path "HKCU:\Software\Classes\thinkmay")) {
              Write-Error "Registry key HKCU:\Software\Classes\thinkmay was not created!"
              exit 1
          }
          
          $key = Get-Item -Path "HKCU:\Software\Classes\thinkmay"
          $protocolDefault = $key.GetValue("")
          $urlProtocol = $key.GetValue("URL Protocol")
          
          if (-not (Test-Path "HKCU:\Software\Classes\thinkmay\shell\open\command")) {
              Write-Error "Registry key HKCU:\Software\Classes\thinkmay\shell\open\command was not created!"
              exit 1
          }
          $cmdKey = Get-Item -Path "HKCU:\Software\Classes\thinkmay\shell\open\command"
          $commandDefault = $cmdKey.GetValue("")
          
          Write-Host "Registry Description: $protocolDefault"
          Write-Host "Registry URL Protocol: $urlProtocol"
          Write-Host "Registry Command: $commandDefault"
          
          if ($protocolDefault -ne "URL:thinkmay Protocol") {
              Write-Error "Protocol description mismatch. Got: $protocolDefault"
              exit 1
          }
          if ($urlProtocol -ne "") {
              Write-Error "URL Protocol flag mismatch. Got: $urlProtocol"
              exit 1
          }
          if ($commandDefault -ne $expectedCmd) {
              Write-Error "Protocol command mismatch. Expected: $expectedCmd, Got: $commandDefault"
              exit 1
          }
          Write-Host "Registry verification passed successfully."
          
          Write-Host "Running uninstaller silently..."
          $uninstallerPath = "$env:LOCALAPPDATA\Thinkmay\Client\uninstall.exe"
          if (-not (Test-Path $uninstallerPath)) {
              Write-Error "Uninstaller not found at $uninstallerPath"
              exit 1
          }
          
          Start-Process -FilePath $uninstallerPath -ArgumentList "/S", "_?=$env:LOCALAPPDATA\Thinkmay\Client" -Wait
          
          Write-Host "Verifying registry clean-up..."
          if (Test-Path "HKCU:\Software\Classes\thinkmay") {
              Write-Error "Registry key HKCU:\Software\Classes\thinkmay still exists after uninstall!"
              exit 1
          }
          Write-Host "Uninstallation registry clean-up verification passed."

  publish_linux:
    name: Publish Linux Client
    runs-on: ubuntu-latest
    needs: [package_linux, test_linux]
    if: github.event_name == 'push' || github.event.inputs.publish == 'true'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: client-linux-package
          path: artifacts

      - name: Upload Linux client
        shell: bash
        run: |
          for arch in amd64 arm64; do
            deb="./artifacts/thinkmay-client-linux-${arch}.deb"
            md5=$(md5sum "${deb}" | cut -d ' ' -f 1)
            curl https://saigon2.thinkmay.net/api/collections/binaries/records \
              -H "Content-Type: multipart/form-data" \
              --form "name=thinkmay_client_linux_deb_${arch}" \
              --form "md5sum=${md5}" \
              --form "file=@${deb}" \
              --progress-bar
          done

  publish_macos:
    name: Publish macOS Client
    runs-on: ubuntu-latest
    needs: [package_macos, test_macos]
    if: github.event_name == 'push' || github.event.inputs.publish == 'true'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: client-macos-package
          path: artifacts

      - name: Upload macOS client
        shell: bash
        run: |
          dmg="./artifacts/thinkmay-client-darwin-arm64.dmg"
          md5=$(md5sum "${dmg}" | cut -d ' ' -f 1)
          curl https://saigon2.thinkmay.net/api/collections/binaries/records \
            -H "Content-Type: multipart/form-data" \
            --form "name=thinkmay_client_macos_dmg" \
            --form "md5sum=${md5}" \
            --form "file=@${dmg}" \
            --progress-bar

  publish_windows:
    name: Publish Windows Client
    runs-on: ubuntu-latest
    needs: [package_windows, test_windows]
    if: github.event_name == 'push' || github.event.inputs.publish == 'true'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: client-windows-package
          path: artifacts

      - name: Upload Windows client installer
        shell: bash
        run: >-
          MD5_CHECKSUM=$(md5sum "./artifacts/thinkmay-client-windows-amd64-installer.exe" | cut -d ' ' -f 1) &&
          curl https://saigon2.thinkmay.net/api/collections/binaries/records
          -H "Content-Type: multipart/form-data"
          --form "name=thinkmay_client_window"
          --form "md5sum=${MD5_CHECKSUM}"
          --form "file=@./artifacts/thinkmay-client-windows-amd64-installer.exe"
          --progress-bar

  release_github:
    name: GitHub Release + Homebrew formulae
    runs-on: ubuntu-latest
    needs: [package_linux, package_macos, test_linux, test_macos]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Download Linux package
        uses: actions/download-artifact@v4
        with:
          name: client-linux-package
          path: artifacts

      - name: Download macOS package
        uses: actions/download-artifact@v4
        with:
          name: client-macos-package
          path: artifacts

      - name: Read client version
        id: version
        run: echo "value=$(tr -d '[:space:]' < packaging/client/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew checksums
        run: ./packaging/homebrew/update-formulae.sh ./artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: Thinkmay Client v${{ steps.version.outputs.value }}
          generate_release_notes: true
          overwrite: true
          files: |
            artifacts/thinkmay-client-linux-amd64.tar.gz
            artifacts/thinkmay-client-linux-amd64.deb
            artifacts/thinkmay-client-linux-arm64.tar.gz
            artifacts/thinkmay-client-linux-arm64.deb
            artifacts/thinkmay-client-darwin-arm64.zip
            artifacts/thinkmay-client-darwin-arm64.dmg
          fail_on_unmatched_files: true

      - name: Commit Homebrew formula updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packaging/homebrew/Formula/thinkmay-client.rb packaging/homebrew/Casks/thinkmay-client.rb
          if git diff --cached --quiet; then
            echo "Homebrew formulae already up to date"
            exit 0
          fi
          git commit -m "chore(homebrew): update thinkmay-client v${{ steps.version.outputs.value }} checksums [skip ci]"
          git push

  test_homebrew_linux:
    name: Test Homebrew Linux formula (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [package_linux]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux package
        uses: actions/download-artifact@v4
        with:
          name: client-linux-package
          path: artifacts

      - name: Update Homebrew checksums
        run: ./packaging/homebrew/update-formulae.sh ./artifacts

      - name: Install Homebrew
        run: NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

      - name: Test formula install via local tap
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          ./packaging/homebrew/test-install.sh linux ./artifacts

  test_homebrew_macos:
    name: Test Homebrew macOS cask
    runs-on: macos-latest
    needs: [package_macos]

    steps:
      - uses: actions/checkout@v4

      - name: Download macOS package
        uses: actions/download-artifact@v4
        with:
          name: client-macos-package
          path: artifacts

      - name: Update Homebrew checksums
        run: ./packaging/homebrew/update-formulae.sh ./artifacts

      - name: Test cask install via local tap
        run: ./packaging/homebrew/test-install.sh macos ./artifacts

