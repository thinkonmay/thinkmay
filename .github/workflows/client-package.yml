---
name: Client Package

on:
  push:
    branches: [main]
    paths:
      - 'worker/proxy/**'
      - 'packaging/client/**'
      - '.github/workflows/client-package.yml'
  workflow_dispatch:
    inputs:
      publish:
        description: Upload packaged clients to binary storage
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package_linux:
    name: Package Linux Client
    runs-on: ubuntu-latest

    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
          cache-dependency-path: worker/proxy/go.sum

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ffmpeg \
            libavcodec-dev \
            libavdevice-dev \
            libavfilter-dev \
            libavformat-dev \
            libavutil-dev \
            libsdl2-dev \
            libswresample-dev \
            libswscale-dev \
            pkg-config

      - name: Build binary
        run: |
          mkdir -p artifacts/package/thinkmay-client-linux-amd64/lib
          cd ./worker/proxy
          go mod download
          CGO_ENABLED=1 go build -trimpath -ldflags="-s -w" -o ../../artifacts/package/thinkmay-client-linux-amd64/thinkmay-client-bin ./cmd/client
          cd ../..
          chmod +x ./artifacts/package/thinkmay-client-linux-amd64/thinkmay-client-bin

      - name: Bundle shared libraries
        run: |
          PKGDIR=artifacts/package/thinkmay-client-linux-amd64
          LIBDIR="${PKGDIR}/lib"
          copy_deps() {
            local deps lib name
            deps=$(ldd "$1" 2>/dev/null | grep '=> /' | awk '{print $3}' || true)
            for lib in $deps; do
              # Skip core system libraries guaranteed on any Linux
              name=$(basename "$lib")
              case "$name" in
                libc.so*|libm.so*|libdl.so*|librt.so*|libpthread.so*|ld-linux*|linux-vdso*|libgcc_s.so*|libstdc++.so*) continue ;;
              esac
              if [ ! -f "${LIBDIR}/${name}" ]; then
                cp "$lib" "${LIBDIR}/"
                copy_deps "$lib"
              fi
            done
          }
          copy_deps "${PKGDIR}/thinkmay-client-bin"
          echo "Bundled libraries:"
          ls -1 "${LIBDIR}/"

      - name: Create launcher and archive
        run: |
          PKGDIR=artifacts/package/thinkmay-client-linux-amd64
          printf '#!/bin/bash\nSCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"\nexport LD_LIBRARY_PATH="${SCRIPT_DIR}/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"\nexec "${SCRIPT_DIR}/thinkmay-client-bin" "$@"\n' > "${PKGDIR}/thinkmay-client"
          chmod +x "${PKGDIR}/thinkmay-client"
          cp ./packaging/client/linux/README.txt "${PKGDIR}/README.txt"
          cp ./packaging/client/linux/thinkmay-client.desktop "${PKGDIR}/thinkmay-client.desktop"
          ldd "${PKGDIR}/thinkmay-client-bin" | tee "${PKGDIR}/thinkmay-client-linux-ldd.txt"
          tar -czf ./artifacts/thinkmay-client-linux-amd64.tar.gz -C ./artifacts/package thinkmay-client-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-linux-package
          path: artifacts/thinkmay-client-linux-amd64.tar.gz

  package_macos:
    name: Package macOS Client
    runs-on: macos-latest

    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
          cache-dependency-path: worker/proxy/go.sum

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: Install dependencies
        run: |
          brew update
          brew install ffmpeg pkg-config sdl2

      - name: Build app bundle
        run: |
          APP="artifacts/macos/Thinkmay Client.app"
          MACOS_DIR="${APP}/Contents/MacOS"
          FRAMEWORKS_DIR="${APP}/Contents/Frameworks"
          mkdir -p "${MACOS_DIR}" "${APP}/Contents/Resources" "${FRAMEWORKS_DIR}"
          cp ./packaging/client/macos/Info.plist "${APP}/Contents/Info.plist"
          cd ./worker/proxy
          go mod download
          CGO_ENABLED=1 go build -trimpath -ldflags="-s -w" -o "../../${MACOS_DIR}/thinkmay-client" ./cmd/client
          cd ../..
          chmod +x "${MACOS_DIR}/thinkmay-client"

      - name: Bundle dylibs
        run: |
          APP="artifacts/macos/Thinkmay Client.app"
          BINARY="${APP}/Contents/MacOS/thinkmay-client"
          FRAMEWORKS="${APP}/Contents/Frameworks"

          copy_deps() {
            local deps lib base
            deps=$(otool -L "$1" 2>/dev/null | tail -n +2 | awk '{print $1}' | grep -v '^/usr/lib/' | grep -v '^/System/' | grep -v '@executable_path' | grep -v '@rpath' | grep -v '@loader_path' || true)
            for lib in $deps; do
              base=$(basename "$lib")
              if [ ! -f "${FRAMEWORKS}/${base}" ]; then
                cp "$lib" "${FRAMEWORKS}/"
                chmod 644 "${FRAMEWORKS}/${base}"
                install_name_tool -id "@executable_path/../Frameworks/${base}" "${FRAMEWORKS}/${base}" 2>/dev/null || true
                copy_deps "${FRAMEWORKS}/${base}"
              fi
              install_name_tool -change "$lib" "@executable_path/../Frameworks/${base}" "$1" 2>/dev/null || true
            done
          }

          copy_deps "${BINARY}"

          # Fix cross-references between bundled dylibs (run until stable)
          for _pass in 1 2 3; do
            for dylib in "${FRAMEWORKS}"/*.dylib; do
              [ -f "$dylib" ] || continue
              local_deps=$(otool -L "$dylib" 2>/dev/null | tail -n +2 | awk '{print $1}' | grep -v '^/usr/lib/' | grep -v '^/System/' | grep -v '@executable_path' | grep -v '@rpath' | grep -v '@loader_path' || true)
              for lib in $local_deps; do
                base=$(basename "$lib")
                if [ -f "${FRAMEWORKS}/${base}" ]; then
                  install_name_tool -change "$lib" "@executable_path/../Frameworks/${base}" "$dylib" 2>/dev/null || true
                fi
              done
            done
          done

          # Ad-hoc codesign everything (required on modern macOS after install_name_tool)
          for f in "${FRAMEWORKS}"/*.dylib; do
            [ -f "$f" ] && codesign --force --sign - "$f" 2>/dev/null || true
          done
          codesign --force --sign - "${BINARY}" 2>/dev/null || true

          echo "Bundled frameworks:"
          ls -1 "${FRAMEWORKS}/"
          echo "Final otool -L:"
          otool -L "${BINARY}" | tee "artifacts/macos/thinkmay-client-macos-otool.txt"
          ditto -c -k --sequesterRsrc --keepParent "${APP}" "artifacts/thinkmay-client-darwin.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-macos-package
          path: artifacts/thinkmay-client-darwin.zip

  package_windows:
    name: Package Windows Client
    runs-on: windows-2025

    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
          cache-dependency-path: worker/proxy/go.sum

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup mingw dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-nsis
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-openal
            mingw-w64-x86_64-libcaca
            mingw-w64-x86_64-libva
            mingw-w64-x86_64-libvpl

      - name: Build client
        shell: msys2 {0}
        run: |
          export CGO_ENABLED=1
          export CC=gcc
          export PKG_CONFIG=pkg-config
          mkdir -p artifacts/windows
          cd ./worker/proxy
          go mod download
          go build -trimpath -ldflags="-s -w -H windowsgui" -o ../../artifacts/windows/thinkmay-client.exe ./cmd/client

      - name: Copy runtime DLLs
        shell: msys2 {0}
        run: |
          # Automatically find and copy all mingw64 DLL dependencies
          copy_deps() {
            local deps dll base
            deps=$(ldd "$1" 2>/dev/null | grep '/mingw64/bin/' | awk '{print $3}' || true)
            for dll in $deps; do
              base=$(basename "$dll")
              if [ ! -f "./artifacts/windows/${base}" ]; then
                cp "$dll" ./artifacts/windows/
                copy_deps "$dll"
              fi
            done
          }
          copy_deps ./artifacts/windows/thinkmay-client.exe
          echo "Copied DLLs:"
          ls -1 ./artifacts/windows/*.dll

      - name: Build zip package
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/windows/* -DestinationPath artifacts/thinkmay-client-windows-amd64.zip

      - name: Build NSIS installer
        shell: msys2 {0}
        run: |
          cp ./packaging/client/windows/client_installer.nsi ./client_installer.nsi
          makensis ./client_installer.nsi
          mv ./thinkmay-client-windows-amd64-installer.exe ./artifacts/thinkmay-client-windows-amd64-installer.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-windows-package
          path: |
            artifacts/thinkmay-client-windows-amd64.zip
            artifacts/thinkmay-client-windows-amd64-installer.exe

  test_linux:
    name: Test Linux Client
    runs-on: ubuntu-latest
    needs: [package_linux]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: client-linux-package
          path: artifacts

      - name: Extract tar package
        run: |
          tar -xzf artifacts/thinkmay-client-linux-amd64.tar.gz -C artifacts
      - name: Run client --help
        run: |
          chmod +x artifacts/thinkmay-client-linux-amd64/thinkmay-client
          chmod +x artifacts/thinkmay-client-linux-amd64/thinkmay-client-bin
          artifacts/thinkmay-client-linux-amd64/thinkmay-client --help || true

      - name: Test custom URL handler registration
        run: |
          DESKTOP_FILE="artifacts/thinkmay-client-linux-amd64/thinkmay-client.desktop"
          if [ ! -f "$DESKTOP_FILE" ]; then
              echo "Desktop file not found at $DESKTOP_FILE"
              exit 1
          fi
          echo "=== thinkmay-client.desktop contents ==="
          cat "$DESKTOP_FILE"
          if ! grep -q "MimeType=.*x-scheme-handler/thinkmay;" "$DESKTOP_FILE"; then
              echo "Custom URL handler mapping (x-scheme-handler/thinkmay) not found in desktop file!"
              exit 1
          fi
          if ! grep -q "Exec=.*-url %u" "$DESKTOP_FILE"; then
              echo "Custom URL launcher argument (-url %u) not found in desktop file Exec line!"
              exit 1
          fi
          echo "Custom URL handler verification passed."
  test_macos:
    name: Test macOS Client
    runs-on: macos-latest
    needs: [package_macos]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: client-macos-package
          path: artifacts

      - name: Extract zip package
        run: |
          ditto -x -k artifacts/thinkmay-client-darwin.zip test-client

      - name: Verify dylib references
        run: |
          echo "=== otool -L on binary ==="
          otool -L "test-client/Thinkmay Client.app/Contents/MacOS/thinkmay-client"
          echo "=== Bundled frameworks ==="
          ls -la "test-client/Thinkmay Client.app/Contents/Frameworks/" || echo "No Frameworks directory"

      - name: Run client --help
        run: |
          chmod +x "test-client/Thinkmay Client.app/Contents/MacOS/thinkmay-client"
          "test-client/Thinkmay Client.app/Contents/MacOS/thinkmay-client" --help || true

      - name: Test custom URL handler registration
        run: |
          PLIST_PATH="test-client/Thinkmay Client.app/Contents/Info.plist"
          if [ ! -f "$PLIST_PATH" ]; then
              echo "Info.plist not found at $PLIST_PATH"
              exit 1
          fi
          python3 -c '
          import plistlib
          with open("'"$PLIST_PATH"'", "rb") as f:
              plist = plistlib.load(f)
          url_types = plist.get("CFBundleURLTypes", [])
          schemes = [scheme for ut in url_types for scheme in ut.get("CFBundleURLSchemes", [])]
          print("Found packaged URL Schemes:", schemes)
          if "thinkmay" not in schemes:
              raise ValueError("Custom URL scheme \"thinkmay\" is missing from Info.plist!")
          '
          echo "Custom URL handler verification passed."

  test_windows:
    name: Test Windows Client
    runs-on: windows-latest
    needs: [package_windows]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: client-windows-package
          path: artifacts

      - name: Extract zip package
        shell: pwsh
        run: |
          Expand-Archive -Path artifacts/thinkmay-client-windows-amd64.zip -DestinationPath test-client

      - name: Run client --help
        shell: pwsh
        run: |
          & ./test-client/thinkmay-client.exe --help
          Write-Host "Exit code: $LASTEXITCODE"
          exit 0

      - name: Test custom URL handler registration via installer
        shell: pwsh
        run: |
          $installerPath = "artifacts/thinkmay-client-windows-amd64-installer.exe"
          if (-not (Test-Path $installerPath)) {
              Write-Error "Installer not found at $installerPath"
              exit 1
          }
          
          Write-Host "Running installer silently..."
          Start-Process -FilePath $installerPath -ArgumentList "/S" -Wait
          
          $expectedPath = "$env:LOCALAPPDATA\Thinkmay\Client\thinkmay-client.exe"
          $expectedCmd = "`"$expectedPath`" -url `"%1`""
          
          Write-Host "Verifying registry keys..."
          if (-not (Test-Path "HKCU:\Software\Classes\thinkmay")) {
              Write-Error "Registry key HKCU:\Software\Classes\thinkmay was not created!"
              exit 1
          }
          
          $key = Get-Item -Path "HKCU:\Software\Classes\thinkmay"
          $protocolDefault = $key.GetValue("")
          $urlProtocol = $key.GetValue("URL Protocol")
          
          if (-not (Test-Path "HKCU:\Software\Classes\thinkmay\shell\open\command")) {
              Write-Error "Registry key HKCU:\Software\Classes\thinkmay\shell\open\command was not created!"
              exit 1
          }
          $cmdKey = Get-Item -Path "HKCU:\Software\Classes\thinkmay\shell\open\command"
          $commandDefault = $cmdKey.GetValue("")
          
          Write-Host "Registry Description: $protocolDefault"
          Write-Host "Registry URL Protocol: $urlProtocol"
          Write-Host "Registry Command: $commandDefault"
          
          if ($protocolDefault -ne "URL:thinkmay Protocol") {
              Write-Error "Protocol description mismatch. Got: $protocolDefault"
              exit 1
          }
          if ($urlProtocol -ne "") {
              Write-Error "URL Protocol flag mismatch. Got: $urlProtocol"
              exit 1
          }
          if ($commandDefault -ne $expectedCmd) {
              Write-Error "Protocol command mismatch. Expected: $expectedCmd, Got: $commandDefault"
              exit 1
          }
          Write-Host "Registry verification passed successfully."
          
          Write-Host "Running uninstaller silently..."
          $uninstallerPath = "$env:LOCALAPPDATA\Thinkmay\Client\uninstall.exe"
          if (-not (Test-Path $uninstallerPath)) {
              Write-Error "Uninstaller not found at $uninstallerPath"
              exit 1
          }
          
          Start-Process -FilePath $uninstallerPath -ArgumentList "/S", "_?=$env:LOCALAPPDATA\Thinkmay\Client" -Wait
          
          Write-Host "Verifying registry clean-up..."
          if (Test-Path "HKCU:\Software\Classes\thinkmay") {
              Write-Error "Registry key HKCU:\Software\Classes\thinkmay still exists after uninstall!"
              exit 1
          }
          Write-Host "Uninstallation registry clean-up verification passed."

  publish_linux:
    name: Publish Linux Client
    runs-on: ubuntu-latest
    needs: [package_linux, test_linux]
    if: github.event_name == 'push' || inputs.publish

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: client-linux-package
          path: artifacts

      - name: Upload Linux client
        shell: bash
        run: >-
          MD5_CHECKSUM=$(md5sum "./artifacts/thinkmay-client-linux-amd64.tar.gz" | cut -d ' ' -f 1) &&
          curl https://saigon2.thinkmay.net/api/collections/binaries/records
          -H "Content-Type: multipart/form-data"
          --form "name=thinkmay_client_linux"
          --form "md5sum=${MD5_CHECKSUM}"
          --form "file=@./artifacts/thinkmay-client-linux-amd64.tar.gz"
          --progress-bar

  publish_macos:
    name: Publish macOS Client
    runs-on: ubuntu-latest
    needs: [package_macos, test_macos]
    if: github.event_name == 'push' || inputs.publish

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: client-macos-package
          path: artifacts

      - name: Upload macOS client
        shell: bash
        run: >-
          MD5_CHECKSUM=$(md5sum "./artifacts/thinkmay-client-darwin.zip" | cut -d ' ' -f 1) &&
          curl https://saigon2.thinkmay.net/api/collections/binaries/records
          -H "Content-Type: multipart/form-data"
          --form "name=thinkmay_client_macos"
          --form "md5sum=${MD5_CHECKSUM}"
          --form "file=@./artifacts/thinkmay-client-darwin.zip"
          --progress-bar

  publish_windows:
    name: Publish Windows Client
    runs-on: ubuntu-latest
    needs: [package_windows, test_windows]
    if: github.event_name == 'push' || inputs.publish

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: client-windows-package
          path: artifacts

      - name: Upload Windows client installer
        shell: bash
        run: >-
          MD5_CHECKSUM=$(md5sum "./artifacts/thinkmay-client-windows-amd64-installer.exe" | cut -d ' ' -f 1) &&
          curl https://saigon2.thinkmay.net/api/collections/binaries/records
          -H "Content-Type: multipart/form-data"
          --form "name=thinkmay_client_window"
          --form "md5sum=${MD5_CHECKSUM}"
          --form "file=@./artifacts/thinkmay-client-windows-amd64-installer.exe"
          --progress-bar
