<svg width="640" height="220" viewBox="0 0 640 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Thinkmay primary CTA button sample</title>
  <desc id="desc">Dark teal rounded CTA button with gradient border, electric teal highlight, and soft glow.</desc>
  <rect width="640" height="220" rx="32" fill="#0A2926"/>
  <g filter="url(#glow)">
    <rect x="150" y="76" width="340" height="68" rx="12" fill="url(#border)"/>
    <rect x="151" y="77" width="338" height="66" rx="11" fill="url(#fill)"/>
    <rect x="151" y="77" width="338" height="66" rx="11" fill="#134E48" fill-opacity="0.88"/>
    <path d="M176 91h288" stroke="white" stroke-opacity="0.16"/>
    <circle cx="206" cy="110" r="12" fill="#5FE9D0" fill-opacity="0.18"/>
    <path d="M200 110h12m-6-6v12" stroke="#5FE9D0" stroke-width="2" stroke-linecap="round"/>
    <text x="232" y="117" fill="white" font-family="SF UI Display, Inter, Arial, sans-serif" font-size="18" font-weight="700">Bắt đầu ngay</text>
  </g>
  <defs>
    <linearGradient id="border" x1="168" y1="145" x2="476" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#15B79E"/>
      <stop offset="0.34" stop-color="#2ED3B7" stop-opacity="0"/>
      <stop offset="1" stop-color="#99F6E0"/>
    </linearGradient>
    <linearGradient id="fill" x1="320" y1="77" x2="320" y2="143" gradientUnits="userSpaceOnUse">
      <stop stop-color="#134E48"/>
      <stop offset="1" stop-color="#0A2926"/>
    </linearGradient>
    <filter id="glow" x="112" y="38" width="416" height="144" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#147666" flood-opacity="0.32"/>
    </filter>
  </defs>
</svg>
