<svg width="720" height="900" viewBox="0 0 720 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Thinkmay mobile ad composition sample</title>
  <desc id="desc">Marketing layout with dark blurred background, white and teal headline, central phone, floating cards, and feature bullets.</desc>
  <rect width="720" height="900" fill="#061B18"/>
  <circle cx="120" cy="140" r="220" fill="#0E9384" opacity="0.22" filter="url(#blur)"/>
  <circle cx="620" cy="640" r="260" fill="#2ED3B7" opacity="0.18" filter="url(#blur)"/>
  <rect x="48" y="48" width="624" height="804" rx="44" fill="url(#panel)" stroke="white" stroke-opacity="0.08"/>
  <text x="360" y="160" fill="white" text-anchor="middle" font-family="SF UI Display, Inter, Arial, sans-serif" font-size="44" font-weight="800">5060Ti trên mọi thiết bị</text>
  <text x="360" y="216" fill="#48EDCF" text-anchor="middle" font-family="SF UI Display, Inter, Arial, sans-serif" font-size="44" font-weight="800">Dùng ngay chỉ từ 59k</text>
  <g transform="translate(248 286)">
    <rect x="0" y="0" width="224" height="398" rx="44" fill="#0B0F0E" stroke="#D9DEDE" stroke-width="4"/>
    <rect x="18" y="20" width="188" height="358" rx="32" fill="url(#screen)"/>
    <rect x="72" y="14" width="80" height="22" rx="11" fill="#050807"/>
    <rect x="42" y="76" width="140" height="72" rx="18" fill="white" fill-opacity="0.08"/>
    <rect x="42" y="168" width="140" height="32" rx="10" fill="#0E9384"/>
    <rect x="42" y="220" width="64" height="64" rx="16" fill="#2ED3B7" fill-opacity="0.24"/>
    <rect x="118" y="220" width="64" height="64" rx="16" fill="white" fill-opacity="0.08"/>
  </g>
  <g opacity="0.9">
    <rect x="106" y="360" width="86" height="86" rx="20" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.18"/>
    <circle cx="149" cy="403" r="22" fill="#5FE9D0" fill-opacity="0.28"/>
    <rect x="528" y="344" width="86" height="86" rx="20" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.18"/>
    <path d="M552 386h38m-19-19v38" stroke="#5FE9D0" stroke-width="5" stroke-linecap="round"/>
    <rect x="122" y="560" width="104" height="72" rx="20" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.16"/>
    <rect x="500" y="580" width="104" height="72" rx="20" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.16"/>
  </g>
  <text x="360" y="738" fill="white" text-anchor="middle" font-family="SF UI Display, Inter, Arial, sans-serif" font-size="24" font-weight="700">Thinkmay - Cloud Gaming số 1 Việt Nam</text>
  <g font-family="SF UI Display, Inter, Arial, sans-serif" font-size="17" font-weight="600" fill="white">
    <circle cx="168" cy="790" r="5" fill="#5FE9D0"/><text x="184" y="796">App browser mọi thiết bị</text>
    <circle cx="402" cy="790" r="5" fill="#5FE9D0"/><text x="418" y="796">Tay cầm, microphone</text>
    <circle cx="168" cy="824" r="5" fill="#5FE9D0"/><text x="184" y="830">Cloud của bạn</text>
    <circle cx="402" cy="824" r="5" fill="#5FE9D0"/><text x="418" y="830">Độ trễ tối ưu</text>
  </g>
  <defs>
    <filter id="blur" x="-220" y="-220" width="1160" height="1160" filterUnits="userSpaceOnUse"><feGaussianBlur stdDeviation="80"/></filter>
    <linearGradient id="panel" x1="360" y1="48" x2="360" y2="852" gradientUnits="userSpaceOnUse"><stop stop-color="#115A54" stop-opacity="0.7"/><stop offset="0.52" stop-color="#001210" stop-opacity="0.95"/></linearGradient>
    <linearGradient id="screen" x1="112" y1="20" x2="112" y2="378" gradientUnits="userSpaceOnUse"><stop stop-color="#0F463F"/><stop offset="1" stop-color="#071F1C"/></linearGradient>
  </defs>
</svg>
