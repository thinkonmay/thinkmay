  <text x="334" y="250" fill="white" font-family="SF UI Display, Inter, Arial, sans-serif" font-size="15" font-weight="700">Mở máy</text>
  <rect x="448" y="224" width="64" height="40" rx="12" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.08"/>
  <path d="M473 238h14m-7-7v14" stroke="#5FE9D0" stroke-width="2" stroke-linecap="round"/>
  <defs>
