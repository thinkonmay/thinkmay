<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Thinkmay glass product card sample</title>
  <desc id="desc">Dark rounded card with subtle white border, teal overlay, thumbnail, metadata, and action pill.</desc>
  <rect width="640" height="360" rx="40" fill="url(#bg)"/>
  <rect x="80" y="72" width="480" height="216" rx="24" fill="white" fill-opacity="0.035" stroke="white" stroke-opacity="0.08"/>
  <rect x="104" y="96" width="168" height="168" rx="20" fill="url(#thumb)"/>
  <path d="M128 204c28-40 62-58 104-54" stroke="#99F6E0" stroke-width="10" stroke-linecap="round" opacity="0.35"/>
  <circle cx="216" cy="136" r="24" fill="#5FE9D0" fill-opacity="0.24"/>
  <text x="304" y="133" fill="white" font-family="SF UI Display, Inter, Arial, sans-serif" font-size="24" font-weight="700">Cloud PC Pro</text>
  <text x="304" y="164" fill="#A6B1B3" font-family="SF UI Display, Inter, Arial, sans-serif" font-size="15" font-weight="500">RTX 5060Ti • 16GB VRAM</text>
